name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          allowed_bots: 'renovate,dependabot'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request. Focus on:
            - Potential bugs and logic errors
            - Security implications
            - CLAUDE.md guideline violations
            - Performance considerations

            Flag only high-signal issues: compile failures, definite logic errors, unambiguous guideline violations.
            Do NOT flag: style preferences, linter-catchable issues, subjective suggestions, pre-existing issues.

            The PR branch is already checked out in the current working directory.

            Use `gh pr diff` to view the changes.
            Use `gh pr comment` for top-level feedback summarizing the review.
            Use `mcp__github_inline_comment__create_inline_comment` to highlight specific code issues inline.
            Only post GitHub comments - do not submit review text as messages.

          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/solutions.md
